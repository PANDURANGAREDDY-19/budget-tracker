# Pre-commit hooks configuration for code quality and security
# Install: pip install pre-commit
# Setup: pre-commit install
# Run all: pre-commit run --all-files
# Update: pre-commit autoupdate

repos:
  # ========== GENERAL ==========
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        name: Trim trailing whitespace
      - id: end-of-file-fixer
        name: Fix end of file
      - id: check-yaml
        name: Check YAML syntax
        args: ['--unsafe']
      - id: check-json
        name: Check JSON syntax
      - id: check-merge-conflict
        name: Check for merge conflicts
      - id: check-case-conflict
        name: Check for case conflicts
      - id: detect-private-key
        name: Detect private keys
      - id: mixed-line-ending
        name: Fix mixed line endings

  # ========== PYTHON: LINTING & FORMATTING ==========
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.2.2
    hooks:
      - id: ruff
        name: Ruff lint (Python)
        args: ['--fix']
        stages: [commit]
      - id: ruff-format
        name: Ruff format (Python)
        stages: [commit]

  # ========== PYTHON: TYPE CHECKING ==========
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        name: MyPy type checking
        additional_dependencies:
          - 'types-requests'
          - 'types-PyYAML'
        args: ['--ignore-missing-imports']
        stages: [commit]

  # ========== SECURITY: SECRETS SCANNING ==========
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.2
    hooks:
      - id: gitleaks
        name: Gitleaks secret scan
        stages: [commit]
        args: ['detect', '--verbose']

  # ========== JAVASCRIPT/TYPESCRIPT: LINTING ==========
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v8.56.0
    hooks:
      - id: eslint
        name: ESLint (JavaScript/TypeScript)
        types: [javascript, jsx, typescript, tsx]
        args: ['--fix']
        additional_dependencies:
          - 'eslint'
          - 'eslint-plugin-react'
          - 'eslint-plugin-react-hooks'
        stages: [commit]

  # ========== JAVASCRIPT/TYPESCRIPT: FORMATTING ==========
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.1
    hooks:
      - id: prettier
        name: Prettier (Code formatting)
        types_or: [javascript, jsx, typescript, tsx, css, scss, json, markdown, yaml]
        args: ['--write']
        stages: [commit]

  # ========== MARKDOWN ==========
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.37.0
    hooks:
      - id: markdownlint
        name: Markdown Linting
        args: ['--config', '.markdownlint.json']
        stages: [commit]

  # ========== DOCKER ==========
  - repo: https://github.com/hadialqattan/dockerfilelint-precommit
    rev: v0.1.0
    hooks:
      - id: dockerfilelint
        name: Dockerfile lint
        stages: [commit]

# ========== CONFIGURATION ==========
default_language_version:
  python: python3.11
  node: "18.0.0"

exclude: |
  (?x)^(
    Frontend/dist/|
    node_modules/|
    \.venv/|
    venv/
  )

fail_fast: false
