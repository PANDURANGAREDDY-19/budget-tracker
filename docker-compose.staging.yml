version: '3.9'

services:
  # PostgreSQL Database (Staging)
  postgres:
    image: postgres:15-alpine
    container_name: budget-tracker-db-staging
    environment:
      POSTGRES_DB: budget_tracker_staging
      POSTGRES_USER: ${DB_USER:-staging_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-staging_pass}
    volumes:
      - postgres_data_staging:/var/lib/postgresql/data
      - ./Database/schema.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-staging_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - budget-tracker-network
    restart: unless-stopped

  # FastAPI Backend (Staging)
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: budget-tracker-backend-staging
    environment:
      DATABASE_URL: postgresql://${DB_USER:-staging_user}:${DB_PASSWORD:-staging_pass}@postgres:5432/budget_tracker_staging
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      DEBUG: "true"
      LOG_LEVEL: debug
      ENVIRONMENT: staging
    volumes:
      - ./Integration:/app/Integration
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - budget-tracker-network
    restart: unless-stopped

  # React Frontend (Staging)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: budget-tracker-frontend-staging
    environment:
      VITE_API_BASE_URL: https://staging-budget-tracker.example.com
      VITE_ENV: staging
    volumes:
      - ./Frontend/src:/app/src
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - budget-tracker-network
    restart: unless-stopped

  # Nginx Reverse Proxy (Staging)
  nginx:
    image: nginx:alpine
    container_name: budget-tracker-nginx-staging
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx-staging.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - frontend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - budget-tracker-network
    restart: unless-stopped

volumes:
  postgres_data_staging:
    driver: local

networks:
  budget-tracker-network:
    driver: bridge
