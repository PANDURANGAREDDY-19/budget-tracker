[pytest]
# Pytest Configuration File
# Reference: https://docs.pytest.org/

testpaths = Testing
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Minimum pytest version
minversion = 7.0

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --cov=Integration
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml
    --cov-branch

# Coverage options
[coverage:run]
source = Integration
omit =
    */tests/*
    */test_*.py
    */__init__.py
    */migrations/*
    */config.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    if 0:
    if False:
    class .*\bProtocol\):
    @(abc\.)?abstractmethod
precision = 2
skip_covered = False
sort = Cover

[coverage:html]
directory = htmlcov
